<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Digital Clock</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050507;
      --fg: #39ff14;
      --muted: #1f8f12;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
    }

    body {
      min-height: 100svh;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    }

    .clock-screen {
      width: 100%;
      height: 100%;
      min-height: calc(100svh - 36px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .clock-card {
      width: min(100%, 1100px);
      text-align: center;
    }

    .time {
      font-family: "Orbitron", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      font-size: clamp(7rem, 30vw, 22rem);
      font-weight: 800;
      line-height: 0.82;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 22px rgba(57, 255, 20, 0.38), 0 0 70px rgba(57, 255, 20, 0.18);
    }

    @media (orientation: portrait) {
      .time {
        font-size: clamp(6rem, 28vw, 13rem);
      }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      body {
        padding-top: max(10px, env(safe-area-inset-top));
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }

      .clock-screen {
        min-height: calc(100svh - 20px);
      }

      .time {
        font-size: clamp(7rem, 56vh, 18rem);
      }
    }
  </style>
</head>
<body>
  <main class="clock-screen" aria-label="Current time">
    <section class="clock-card">
      <div id="time" class="time">00:00</div>
    </section>
  </main>

  <script>
    const timeElement = document.getElementById("time");

    function updateClock() {
      const now = new Date();

      timeElement.textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
